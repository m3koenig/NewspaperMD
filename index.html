<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Markdown-Zeitungs-Renderer v0.7.0</title>
    
    <!-- Dynamisches Manifest für die PWA-Fähigkeit -->
    <link rel="manifest" id="manifest-link">
    <meta name="theme-color" content="#1e293b">
    
    <!-- Externe Bibliotheken -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Import einer klassischen Zeitungs-Serifenschrift */
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@700;900&display=swap');

        /* Eigener Scrollbar für einen schickeren Look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Spezifische Zeitungs-Styles (unabhängig von Tailwind für den Inhalt) */
        #newspaper-output {
            background-color: #fdfbf7; /* Leichter Zeitungspapier-Ton für mehr Authentizität */
            padding: 3rem 4rem;
            column-count: 1;
            column-gap: 3rem;
            column-rule: 1px solid #d1d5db; /* Diskrete Trennlinie zwischen den Spalten */
            line-height: 1.7;
            color: #1f2937;
            font-size: 15px;
            font-family: 'Merriweather', serif;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        @media (min-width: 1024px) { #newspaper-output { column-count: 2; } }

        #newspaper-output h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 3.5rem; 
            text-transform: uppercase; 
            text-align: center;
            border-top: 6px double #111827; 
            border-bottom: 2px solid #111827;
            padding: 20px 0; 
            margin-top: 0; 
            margin-bottom: 30px; 
            column-span: all; /* Wichtig: Überschrift geht über alle Spalten */
            line-height: 1.1;
            letter-spacing: -0.02em;
        }
        #newspaper-output h2 { 
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; 
            margin-top: 1.5em; 
            margin-bottom: 0.5em; 
            break-inside: avoid; 
            column-span: all; /* Sub-Überschrift geht nun auch über die gesamte Breite */
            line-height: 1.25;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 10px;
        }
        #newspaper-output h3 { 
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem; 
            font-weight: bold; 
            margin-top: 1.5em; 
            margin-bottom: 0.75em; 
            break-inside: avoid; 
        }
        #newspaper-output p { 
            margin-bottom: 1.2em; 
            text-align: justify; 
            hyphens: auto; 
            orphans: 3; /* Verhindert einzelne Zeilen am Spaltenende */
            widows: 3;  /* Verhindert einzelne Zeilen am Spaltenanfang */
        }
        
        figure.news-image {
            margin: 25px auto; break-inside: avoid; text-align: center;
        }
        figure.img-full { column-span: all; width: 100%; }
        figure.img-medium { column-span: all; width: 60%; }
        figure.img-small { column-span: none; width: 100%; margin: 15px 0; }
        
        figure.news-image img { width: 100%; height: auto; display: block; border: 1px solid #e5e7eb; border-radius: 2px; }
        figure.news-image figcaption {
            font-family: 'Merriweather', serif;
            font-size: 0.8rem; font-style: italic; color: #4b5563; margin-top: 10px;
            line-height: 1.4; border-left: 3px solid #374151; padding-left: 12px; text-align: left;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen flex flex-col font-sans overflow-hidden">

    <header class="bg-slate-900 text-white shadow-md flex-none z-10">

            </div>
            <div class="text-xs font-mono bg-slate-800 px-2 py-1 rounded text-slate-400 border border-slate-700">v0.7.0</div>

    </header>

    <main class="flex-1 max-w-[1600px] w-full mx-auto flex flex-col md:flex-row gap-4 p-4 overflow-hidden">
        
        <div class="w-full md:w-1/2 lg:w-5/12 flex flex-col bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden h-1/2 md:h-full">
            <div class="bg-slate-50 border-b border-slate-200 p-2 flex flex-wrap gap-2 items-center justify-between">
                <div class="flex gap-2">
                    <button onclick="document.getElementById('fileInput').click()" class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-md hover:bg-slate-50 hover:text-blue-600 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" title="Bild einfügen">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span class="hidden sm:inline">Bild</span>
                    </button>
                    <input type="file" id="fileInput" style="display:none" accept="image/*">
                </div>
                
                <div class="flex gap-2">

                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>

                    <button onclick="openClearModal()" class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-md hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-red-500" title="Inhalt löschen">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>

            <textarea id="editor" class="flex-1 p-4 w-full resize-none outline-none font-mono text-sm bg-white text-slate-800 transition-colors" placeholder="Schreibe hier deinen Artikel im Markdown-Format..."></textarea>

                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>

            </div>
        </div>
    </main>

    <div id="delete-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-200">

            </div>
        </div>

        const fileInput = document.getElementById('fileInput');

        const deleteModalContent = document.getElementById('delete-modal-content');

        window.onload = () => {
            const saved = localStorage.getItem('newspaper-draft');
            editor.value = saved || demoMarkdown;
            render();
            initPWA();
        };

        function processMarkdown(text) {
            // Bilder für das Zeitungs-Layout formatieren und Größen erkennen
            return text.replace(/!\[(.*?)\]\((.*?)\)/g, (match, altText, url) => {
                let alt = altText;
                let sizeClass = 'img-full'; // Standard: Groß über alle Spalten
                
                // Prüfen, ob ein Größen-Tag mit "|" angehängt wurde
                if (altText.includes('|')) {
                    const parts = altText.split('|');
                    alt = parts[0].trim();
                    const sizeIndicator = parts[1].trim().toLowerCase();
                    
                    if (sizeIndicator === 'klein' || sizeIndicator === 'small') {
                        sizeClass = 'img-small';
                    } else if (sizeIndicator === 'mittel' || sizeIndicator === 'medium') {
                        sizeClass = 'img-medium';
                    }
                }
                
                return `<figure class="news-image ${sizeClass}"><img src="${url}" alt="${alt}"><figcaption>${alt}</figcaption></figure>`;
            });
        }

        function render() {
            let markdown = editor.value;
            let html = processMarkdown(markdown);
            output.innerHTML = marked.parse(html);
            charCount.textContent = `${markdown.length} Zeichen`;
        }

        function saveDraft() {
            localStorage.setItem('newspaper-draft', editor.value);
            // Kleines visuelles Feedback
            const btn = document.querySelector('button[title="Entwurf speichern"]');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<svg class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg><span class="hidden sm:inline text-emerald-600">Gespeichert!</span>`;
            setTimeout(() => { btn.innerHTML = originalHTML; }, 2000);
        }

        // --- Custom Modal Logik (Ersetzt window.confirm) ---
        function openClearModal() {
            deleteModal.classList.remove('hidden');
            // Timeout für Fade-In Effekt
            setTimeout(() => {
                deleteModal.classList.remove('opacity-0');
                deleteModalContent.classList.remove('scale-95');
            }, 10);
        }

        function closeClearModal() {
            deleteModal.classList.add('opacity-0');
            deleteModalContent.classList.add('scale-95');
            // Timeout warten bis Animation fertig ist
            setTimeout(() => {
                deleteModal.classList.add('hidden');
            }, 200);
        }

        function confirmClearDraft() {
            editor.value = '';
            localStorage.removeItem('newspaper-draft');
            render();
            closeClearModal();
        }
        // ----------------------------------------------------

        function exportPDF() {
            const element = document.getElementById('newspaper-output');
            
            // Konfiguration für besseren PDF-Export
            const opt = {
                margin:       10,
                filename:     'MeineZeitung.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            // Vor dem Export etwas umstrukturieren für perfekte PDF Maße
            element.style.width = '800px'; 
            html2pdf().set(opt).from(element).save().then(() => {
                element.style.width = '100%'; // Zurücksetzen nach Export
            });
        }

        function exportImage() {
            const element = document.getElementById('newspaper-output');
            const originalWidth = element.style.width;
            
            // Temporäre Breite für ein sauberes, zweispaltiges Rendering im Bild
            element.style.width = '800px'; 
            
            // html2canvas explizit aufrufen
            html2canvas(element, {
                scale: 2, // Hohe Auflösung für scharfen Text
                useCORS: true, // Erlaubt ggf. externe Bilder
                backgroundColor: '#fdfbf7' // Nutzt den exakten Papierton
            }).then(canvas => {
                // Breite zurücksetzen
                element.style.width = originalWidth || '100%';
                
                // Download anstoßen
                const link = document.createElement('a');
                link.download = 'MeineZeitung.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                console.error("Fehler beim Bild-Export:", err);
                element.style.width = originalWidth || '100%';
            });
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const base64 = event.target.result;
                const markdownImage = `![Bildbeschreibung](${base64})`;
                const start = editor.selectionStart;
                editor.value = editor.value.slice(0, start) + "\n" + markdownImage + "\n" + editor.value.slice(start);
                render();
            };
            reader.readAsDataURL(file);
            fileInput.value = ''; // Reset Input
        });

        editor.addEventListener('input', render);

        function initPWA() {
            // 1. Dynamisches Manifest erstellen (damit wir keine extra .json brauchen)
            const manifest = {
                name: "Markdown Zeitung",
                short_name: "Zeitung",
                description: "Erstelle klassische Zeitungsartikel mit Markdown",
                display: "standalone",
                start_url: ".",
                background_color: "#f8fafc",
                theme_color: "#1e293b",
                icons: [{
                    src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzFlMjkzYiIvPjx0ZXh0IHk9IjUyIiB4PSI1MCIgZm9udC1zaXplPSI1NCIgZm9udC1mYW1pbHk9InNlcmlmIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjZmZmIj5aPC90ZXh0Pjwvc3ZnPg==",
                    sizes: "512x512",
                    type: "image/svg+xml",
                    purpose: "any maskable"
                }]
            };
            
            const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
            const manifestURL = URL.createObjectURL(manifestBlob);
            document.getElementById('manifest-link').setAttribute('href', manifestURL);

            // 2. Service Worker dynamisch registrieren
            if ('serviceWorker' in navigator) {
                const swCode = `
                    const CACHE_NAME = 'zeitung-v0.7.0';
                    self.addEventListener('install', (e) => {
                        self.skipWaiting();
                    });
                    self.addEventListener('activate', (e) => {
                        self.clients.claim();
                    });
                    self.addEventListener('fetch', (e) => {
                        // Einfache Pass-Through Strategie für den Anfang
                        e.respondWith(fetch(e.request).catch(() => new Response('Offline')));
                    });
                `;
                const swBlob = new Blob([swCode], {type: 'application/javascript'});
                const swUrl = URL.createObjectURL(swBlob);
                
                navigator.serviceWorker.register(swUrl)
                    .then(reg => console.log('PWA Service Worker registriert!'))
                    .catch(err => console.error('SW Registrierung fehlgeschlagen:', err));
            }
        }
    </script>
