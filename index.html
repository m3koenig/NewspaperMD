<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Markdown-Zeitungs-Renderer v0.3.6</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Import einer klassischen Zeitungs-Serifenschrift */
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@700;900&display=swap');

        :root {
            --bg-color: #f0ede5;
            --paper-color: #ffffff;
        }

        body {
            font-family: 'Merriweather', serif; /* Klassischer Zeitungs-Look */
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 800px; }

        #editor {
            width: 100%; height: 200px; padding: 15px; border: 1px solid #aaa;
            border-radius: 8px; margin-bottom: 20px; font-family: 'Courier New', monospace;
            box-sizing: border-box; background: #fcfcfc;
        }

        .toolbar { margin-bottom: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 8px 16px; cursor: pointer; border-radius: 4px; border: 1px solid #333; background: #fff; font-weight: bold; }
        button:hover { background: #eee; }

        #newspaper-output {
            background-color: var(--paper-color);
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-height: 400px;
            column-count: 1;
            column-gap: 40px;
            column-fill: balance;
            line-height: 1.6;
            color: #1a1a1a;
            font-size: 16px;
        }

        @media (min-width: 768px) { #newspaper-output { column-count: 2; } }

        /* Zeitungselemente */
        #newspaper-output h1 { 
            font-family: 'Playfair Display', serif; /* Wuchtige Headline-Schrift */
            font-size: 2.5rem; text-transform: uppercase; text-align: center;
            border-top: 4px double #000; border-bottom: 2px solid #000;
            padding: 10px 0; margin-bottom: 20px; column-span: all;
        }
        #newspaper-output h2 { 
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem; margin-top: 20px; margin-bottom: 10px; break-inside: avoid; column-span: all;
        }
        #newspaper-output h3 { 
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #000;
            margin-top: 25px; margin-bottom: 15px; break-inside: avoid; column-span: all;
        }
        #newspaper-output p { margin-bottom: 15px; text-align: justify; hyphens: auto; break-inside: avoid; }
        
        /* Bilder mit Caption */
        figure.news-image {
            margin: 20px 0; break-inside: avoid; column-span: all; text-align: center;
        }
        figure.news-image img { width: 100%; height: auto; display: block; border: 1px solid #ddd; }
        figure.news-image figcaption {
            font-family: 'Merriweather', serif;
            font-size: 0.85rem; font-style: italic; color: #444; margin-top: 8px;
            line-height: 1.3; border-left: 2px solid #333; padding-left: 10px; text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Zeitungs-Editor</h1>
        <div class="toolbar">
            <button onclick="saveDraft()">Entwurf speichern</button>
            <button onclick="exportPDF()">Als PDF speichern</button>
            <button onclick="document.getElementById('fileInput').click()">Bild einfügen</button>
            <button onclick="clearDraft()">Löschen</button>
            <input type="file" id="fileInput" style="display:none" accept="image/*">
        </div>
        <textarea id="editor" placeholder="Schreibe hier deinen Artikel..."></textarea>
        <div id="newspaper-output"></div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const output = document.getElementById('newspaper-output');
        const fileInput = document.getElementById('fileInput');
        
        const demoMarkdown = `# Die digitale Revolution
## Ein neues Zeitalter der Typografie
Es ist erstaunlich, wie einfach sich strukturierter Markdown-Text in ein klassisches Zeitungs-Layout verwandeln lässt.

### Warum dieses Format?
Die Lesbarkeit von Texten hängt stark von der Spaltenbreite ab. Das zweispaltige Layout ist der goldene Mittelweg.

`;

        window.onload = () => {
            const saved = localStorage.getItem('newspaper-draft');
            editor.value = saved || demoMarkdown;
            render();
        };

        function processMarkdown(text) {
            return text.replace(/!\[(.*?)\]\((.*?)\)/g, 
                '<figure class="news-image"><img src="$2" alt="$1"><figcaption>$1</figcaption></figure>');
        }

        function render() {
            let markdown = editor.value;
            let html = processMarkdown(markdown);
            output.innerHTML = marked.parse(html);
        }

        function saveDraft() {
            localStorage.setItem('newspaper-draft', editor.value);
        }

        function clearDraft() {
            if(confirm('Wirklich alles löschen?')) {
                editor.value = '';
                localStorage.removeItem('newspaper-draft');
                render();
            }
        }

        function exportPDF() {
            const element = document.getElementById('newspaper-output');
            html2pdf().from(element).save('MeineZeitung.pdf');
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const base64 = event.target.result;
                const markdownImage = `![Bildbeschreibung](${base64})`;
                const start = editor.selectionStart;
                editor.value = editor.value.slice(0, start) + markdownImage + editor.value.slice(start);
                render();
            };
            reader.readAsDataURL(file);
        });

        editor.addEventListener('input', render);
    </script>
</body>
</html>
