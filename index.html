<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Markdown-Zeitungs-Renderer v0.10.0</title>
    
    <link rel="manifest" id="manifest-link">
    <meta name="theme-color" content="#1e293b">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@700;900&display=swap');

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        #newspaper-output {
            background-color: #fdfbf7;
            padding: 3rem 4rem;
            column-count: 1;
            column-gap: 3rem;
            column-rule: 1px solid #d1d5db;
            line-height: 1.7;
            color: #1f2937;
            font-size: 15px;
            font-family: 'Merriweather', serif;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        @media (min-width: 1024px) { #newspaper-output { column-count: 2; } }

        #newspaper-output h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; text-transform: uppercase; text-align: center; border-top: 6px double #111827; border-bottom: 2px solid #111827; padding: 20px 0; margin-top: 0; margin-bottom: 30px; column-span: all; line-height: 1.1; letter-spacing: -0.02em; }
        #newspaper-output h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-top: 1.5em; margin-bottom: 0.5em; break-inside: avoid; column-span: all; line-height: 1.25; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; }
        #newspaper-output h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: bold; margin-top: 1.5em; margin-bottom: 0.75em; break-inside: avoid; }
        #newspaper-output p { margin-bottom: 1.2em; text-align: justify; hyphens: auto; orphans: 3; widows: 3; }
        
        figure.news-image { margin: 25px auto; break-inside: avoid; text-align: center; }
        figure.img-full { column-span: all; width: 100%; }
        figure.img-medium { column-span: all; width: 60%; }
        /* For small, we don't force column-span: all, letting it fit in the current column */
        figure.img-small { column-span: none; width: 100%; margin: 15px 0; }
        
        figure.news-image img { width: 100%; height: auto; display: block; border: 1px solid #e5e7eb; border-radius: 2px; }
        figure.news-image figcaption { font-family: 'Merriweather', serif; font-size: 0.8rem; font-style: italic; color: #4b5563; margin-top: 10px; line-height: 1.4; border-left: 3px solid #374151; padding-left: 12px; text-align: left; }

        .layout-spacer {
            display: block;
            height: 1.25rem;
        }

        .page-break {
            display: block;
            width: 100%;
            margin: 2rem 0 1.5rem;
            border-top: 2px dashed #cbd5e1;
            page-break-after: always;
            break-after: page;
        }

        .image-menu-wrapper {
            position: relative;
        }

        .image-menu {
            position: absolute;
            top: calc(100% + 0.25rem);
            left: 0;
            display: none;
            flex-direction: column;
            min-width: 13rem;
            padding: 0.25rem;
            gap: 0.25rem;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
            z-index: 30;
        }

        .image-menu.open {
            display: flex;
        }

        .image-submenu {
            border-top: 1px solid #e2e8f0;
            margin-top: 0.25rem;
            padding-top: 0.25rem;
        }

        .raw-images-panel {
            border-top: 1px solid #e2e8f0;
            background: #f8fafc;
            padding: 0.75rem;
            max-height: 12rem;
            overflow: auto;
        }

        .raw-images-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .raw-image-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 0.6rem 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            background: white;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
        }

        .raw-image-item:hover {
            transform: translateY(-1px);
            border-color: #94a3b8;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
        }

        .raw-image-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: #0f172a;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .raw-image-meta {
            font-size: 0.7rem;
            color: #64748b;
        }

        .raw-image-preview {
            width: 2.4rem;
            height: 2.4rem;
            object-fit: cover;
            border-radius: 0.35rem;
            border: 1px solid #e2e8f0;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen flex flex-col font-sans overflow-hidden">

    <header class="bg-slate-900 text-white shadow-md flex-none z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <h1 class="text-xl font-bold tracking-tight">Zeitungs-Renderer</h1>
            </div>
            <div class="text-xs font-mono bg-slate-800 px-2 py-1 rounded text-slate-400 border border-slate-700">v0.10.0</div>
        </div>
    </header>

    <main class="flex-1 max-w-[1600px] w-full mx-auto flex flex-col md:flex-row gap-4 p-4 overflow-hidden">
        <div class="w-full md:w-1/2 lg:w-5/12 flex flex-col bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden h-1/2 md:h-full">
            <div class="bg-slate-50 border-b border-slate-200 p-2 flex flex-wrap gap-2 items-center justify-between">
                <div class="image-menu-wrapper">
                    <button id="image-trigger" type="button" class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-md hover:bg-slate-50">Bild</button>
                    <div id="image-menu" class="image-menu">
                        <button type="button" class="image-menu-item px-3 py-2 text-left text-sm text-slate-700 rounded-md hover:bg-slate-100" data-mode="direct">Direkteinfügen</button>
                        <button type="button" class="image-menu-item px-3 py-2 text-left text-sm text-slate-700 rounded-md hover:bg-slate-100" data-mode="reference">Als Referenz einfügen</button>
                        <div class="image-submenu">
                            <button type="button" class="image-menu-item px-3 py-2 text-left text-sm text-slate-700 rounded-md hover:bg-slate-100" data-action="embed-images">Bilder in Text einbetten (Base64)</button>
                            <button type="button" class="image-menu-item px-3 py-2 text-left text-sm text-slate-700 rounded-md hover:bg-slate-100" data-action="extract-images">Bilder aus Text extrahieren</button>
                        </div>
                    </div>
                </div>
                <input type="file" id="fileInput" style="display:none" accept="image/*">
                <div class="flex gap-2">
                    <button onclick="openArticlesModal()" class="px-3 py-1.5 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-md hover:bg-slate-50 shadow-sm">Öffnen</button>
                    <button id="save-btn" onclick="saveArticle()" class="px-3 py-1.5 text-sm font-medium text-white bg-slate-700 border border-slate-700 rounded-md hover:bg-slate-800 shadow-sm transition-colors duration-200">Speichern</button>
                    <button onclick="openClearModal()" class="px-3 py-1.5 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-md hover:bg-red-50 hover:text-red-600 shadow-sm">Leeren</button>
                </div>
            </div>
            <textarea id="editor" class="flex-1 p-4 w-full resize-none outline-none font-mono text-sm bg-white text-slate-800 transition-colors"></textarea>
            <div class="raw-images-panel">
                <div class="text-xs font-semibold text-slate-600 mb-2">Raw Base64 Bilder</div>
                <div id="raw-images-output" class="raw-images-list"></div>
            </div>
            <div class="bg-slate-50 border-t border-slate-200 p-2 text-xs text-slate-500 flex justify-between">
                <span>Markdown wird live gerendert</span>
                <span id="char-count">0 Zeichen</span>
            </div>
        </div>

        <div class="w-full md:w-1/2 lg:w-7/12 bg-slate-200 rounded-xl overflow-hidden relative flex flex-col h-1/2 md:h-full border border-slate-300 shadow-inner">
            <div class="absolute top-4 right-4 z-10 flex gap-2">
                <button onclick="exportImage()" class="px-3 py-2 text-sm font-bold text-white bg-emerald-600 rounded-lg hover:bg-emerald-700 shadow-lg">Bild Export</button>
                <button onclick="exportPDF()" class="px-3 py-2 text-sm font-bold text-white bg-blue-600 rounded-lg hover:bg-blue-700 shadow-lg">PDF Export</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 md:p-8 flex justify-center items-start pb-20" id="preview-container">
                <div id="newspaper-output" class="max-w-[900px] w-full shrink-0 my-4 lg:my-8 transition-all"></div>
            </div>
        </div>
    </main>

    <div id="articles-modal" class="fixed inset-0 bg-slate-900/50 hidden z-50 flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden flex flex-col max-h-[80vh] transform scale-95 transition-transform duration-300" id="articles-modal-content">
            <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                <h2 class="text-lg font-bold text-slate-800">Meine Artikel</h2>
                <button onclick="closeArticlesModal()" class="text-slate-400 hover:text-slate-600 text-2xl font-bold leading-none">&times;</button>
            </div>
            <div id="articles-list" class="p-4 overflow-y-auto flex-1 flex flex-col gap-2 bg-slate-50/50">
                <!-- Artikel werden hier generiert -->
            </div>
            <div class="p-4 border-t border-slate-200 bg-white flex justify-end">
                <button onclick="createNewArticle()" class="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 text-sm font-bold shadow-sm">+ Neuen Artikel beginnen</button>
            </div>
        </div>
    </div>

    <div id="input-modal" class="fixed inset-0 bg-slate-900/50 hidden z-[60] flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden transform scale-95 transition-transform duration-300" id="input-modal-content">
            <div class="p-4 border-b border-slate-200">
                <h3 id="input-modal-title" class="text-lg font-bold text-slate-800">Titel</h3>
            </div>
            <div class="p-4">
                <input type="text" id="input-modal-field" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-emerald-500" placeholder="Name...">
            </div>
            <div class="p-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-2">
                <button onclick="closeInputModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Abbrechen</button>
                <button id="input-modal-submit" class="px-4 py-2 text-sm font-bold text-white bg-emerald-600 hover:bg-emerald-700 rounded-lg shadow-sm transition-colors">Speichern</button>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/50 hidden z-[60] flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden transform scale-95 transition-transform duration-300" id="confirm-modal-content">
            <div class="p-5 text-center">
                <h3 id="confirm-modal-text" class="text-lg font-medium text-slate-800 mb-4">Wirklich fortfahren?</h3>
                <div class="flex justify-center gap-3">
                    <button onclick="closeConfirmModal()" class="px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">Abbrechen</button>
                    <button id="confirm-modal-submit" class="px-4 py-2 text-sm font-bold text-white bg-red-600 hover:bg-red-700 rounded-lg shadow-sm transition-colors">Ja, weiter</button>
                </div>
            </div>
        </div>
    </div>

Die Lesbarkeit von Texten hängt stark von der Spaltenbreite ab. Das zweispaltige Layout ist der goldene Mittelweg.

        function normalizeReferenceLabel(label) {
            return label.trim().toLowerCase();
        }

        function extractReferenceDefinitions(text) {
            const definitions = {};
            const lines = text.split(/\r?\n/);

            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed || trimmed.startsWith('>')) return;

                const match = trimmed.match(/^\[([^\]]+)\]:\s*(.+?)(?:\s+(?:"[^"]*"|'[^']*'|\([^)]*\)))?$/);
                if (match) {
                    const [, id, rawDestination] = match;
                    let destination = rawDestination.trim();

                    if ((destination.startsWith('<') && destination.endsWith('>')) || (destination.startsWith('(') && destination.endsWith(')'))) {
                        destination = destination.slice(1, -1).trim();
                    }

                    definitions[normalizeReferenceLabel(id)] = destination.replace(/^<|>$/g, '');
                }
            });

            return definitions;
        }

        function resolveReferenceStyleLinks(markdown, definitions) {
            return markdown.replace(/(!)?\[([^\]]+)\]\[([^\]]*)\]/g, (match, imageMarker, label, refLabel) => {
                if (imageMarker) return match;

                const referenceId = (refLabel || label).trim();
                const destination = definitions[normalizeReferenceLabel(referenceId)];

                if (!destination) return match;
                return `[${label}](${destination})`;
            });
        }

        function resolveReferenceStyleImages(markdown, definitions) {
            return markdown.replace(/!\[([^\]]*)\]\[([^\]]*)\]/g, (match, altText, refLabel) => {
                const referenceId = (refLabel || '').trim();
                const destination = definitions[normalizeReferenceLabel(referenceId)];

                if (!destination) return match;

                let alt = altText;
                let sizeClass = 'img-full';

                if (altText.includes('|')) {
                    const parts = altText.split('|');
                    alt = parts[0].trim();
                    const sizeIndicator = parts[1].trim().toLowerCase();
                    if (sizeIndicator === 'klein' || sizeIndicator === 'small') sizeClass = 'img-small';
                    else if (sizeIndicator === 'mittel' || sizeIndicator === 'medium') sizeClass = 'img-medium';
                }

                const resolvedUrl = localImages[destination] || destination;
                return `<figure class="news-image ${sizeClass}"><img src="${resolvedUrl}" alt="${alt}"><figcaption>${alt}</figcaption></figure>`;
            });
        }

        function preprocessLayoutMarkup(text) {
            return text
                .replace(/(^|\n)\s*<\x21--\s*(pagebreak|seitenumbruch)\s*--\x3e\s*(?=\n|$)/g, '\n<div class="page-break"></div>\n')
                .replace(/(^|\n)\s*<\x21--\s*(spacer|leerzeile|blank)\s*--\x3e\s*(?=\n|$)/g, '\n<div class="layout-spacer"></div>\n');
        }

        function processMarkdown(text) {
            const formatAsFigure = (altText, urlOrRef) => {
                let alt = altText;
                let sizeClass = 'img-full';
                
                if (altText.includes('|')) {
                    const parts = altText.split('|');
                    alt = parts[0].trim();
                    const sizeIndicator = parts[1].trim().toLowerCase();
                    if (sizeIndicator === 'klein' || sizeIndicator === 'small') sizeClass = 'img-small';
                    else if (sizeIndicator === 'mittel' || sizeIndicator === 'medium') sizeClass = 'img-medium';
                }
                
                return `<figure class="news-image ${sizeClass}"><img src="${urlOrRef}" alt="${alt}"><figcaption>${alt}</figcaption></figure>`;
            };

            const definitions = extractReferenceDefinitions(text);
            let html = preprocessLayoutMarkup(text);
            html = resolveReferenceStyleLinks(html, definitions);
            html = resolveReferenceStyleImages(html, definitions);
            html = html.replace(/!\[(.*?)\]\((.*?)\)/g, (match, alt, url) => formatAsFigure(alt, url));

            const container = document.createElement('div');
            container.innerHTML = marked.parse(html);
            return container.innerHTML;
        }

            field.value = defaultText;
            inputModalCallback = callback;

            const modal = document.getElementById('input-modal');

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                field.focus();

        }

        function getArticleTitle(markdown) {
            const match = markdown.match(/^#{1,3}\s+(.+)$/m);
            return match ? match[1].trim() : "Mein Artikel";
        }

        function saveArticle() {
            const markdown = editor.value;
            const defaultTitle = getArticleTitle(markdown);

            if (!currentArticleId || !savedArticles[currentArticleId]) {
                openInputModal("Bitte gib einen Namen für diesen Artikel ein:", defaultTitle, (title) => {
                    if (!title) return; // Abgebrochen
                    currentArticleId = 'art-' + Date.now();
                    savedArticles[currentArticleId] = { title: title };
                    finalizeSave();
                });
            } else {
                finalizeSave();
            }
        }

        function finalizeSave() {
            const article = savedArticles[currentArticleId];
            if (!article) return;

            const markdownTitle = getArticleTitle(editor.value);
            article.title = article.title && article.title !== "Mein Artikel" && article.title !== markdownTitle
                ? article.title
                : markdownTitle;
            article.content = editor.value;
            article.date = new Date().toISOString();
            
            localStorage.setItem('newspaper-articles', JSON.stringify(savedArticles));
            localStorage.setItem('newspaper-current-id', currentArticleId);
            localStorage.setItem('newspaper-draft', editor.value);
            
            // Visuelles Feedback
            const btn = document.getElementById('save-btn');
            btn.textContent = "Gespeichert!";
            btn.classList.add('bg-emerald-600', 'border-emerald-600');
            btn.classList.remove('bg-slate-700', 'border-slate-700');
            setTimeout(() => {
                btn.textContent = "Speichern";
                btn.classList.remove('bg-emerald-600', 'border-emerald-600');
                btn.classList.add('bg-slate-700', 'border-slate-700');
            }, 1500);
        }

        function openArticlesModal() {
            renderArticlesList();
            const modal = document.getElementById('articles-modal');
            const content = document.getElementById('articles-modal-content');
            modal.classList.remove('hidden');
            // Timeout für weiche CSS-Animation
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        }

        function closeArticlesModal() {
            const modal = document.getElementById('articles-modal');
            const content = document.getElementById('articles-modal-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function renderArticlesList() {
            const list = document.getElementById('articles-list');
            list.innerHTML = '';
            const entries = Object.entries(savedArticles).sort((a,b) => new Date(b[1].date) - new Date(a[1].date));
            
            if (entries.length === 0) {
                list.innerHTML = '<p class="text-sm text-slate-500 text-center py-8">Noch keine Artikel gespeichert.</p>';
                return;
            }
            
            entries.forEach(([id, art]) => {
                const isCurrent = id === currentArticleId;
                const dateStr = new Date(art.date).toLocaleDateString('de-DE', { hour: '2-digit', minute:'2-digit' });
                
                const div = document.createElement('div');
                div.className = `flex justify-between items-center p-3 rounded-lg border transition-colors ${isCurrent ? 'border-blue-300 bg-blue-50' : 'border-slate-200 bg-white hover:border-slate-300 hover:shadow-sm'}`;
                div.innerHTML = `
                    <div class="flex-1 cursor-pointer" onclick="loadArticle('${id}')">
                        <div class="font-bold text-slate-800 ${isCurrent ? 'text-blue-700' : ''}">${art.title}</div>
                        <div class="text-xs text-slate-500 flex items-center gap-2 mt-1">
                            <span class="inline-block w-2 h-2 rounded-full ${isCurrent ? 'bg-blue-500' : 'bg-slate-300'}"></span>
                            Zuletzt bearbeitet: ${dateStr}
                        </div>
                    </div>
                    <button onclick="deleteArticle('${id}')" title="Löschen" class="ml-4 text-red-400 hover:text-red-600 p-2 rounded-md hover:bg-red-50 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                `;
                list.appendChild(div);
            });
        }

        function loadArticle(id) {
            if (savedArticles[id]) {
                editor.value = savedArticles[id].content;
                currentArticleId = id;
                localStorage.setItem('newspaper-current-id', currentArticleId);
                localStorage.setItem('newspaper-draft', editor.value);
                render();
                closeArticlesModal();
            }
        }

        function deleteArticle(id) {
            openConfirmModal('Möchtest du diesen Artikel wirklich unwiderruflich löschen?', () => {
                delete savedArticles[id];
                localStorage.setItem('newspaper-articles', JSON.stringify(savedArticles));
                if (currentArticleId === id) {
                    currentArticleId = null;
                    localStorage.removeItem('newspaper-current-id');
                }
                renderArticlesList();
            });
        }

        function createNewArticle() {
            currentArticleId = null;
            localStorage.removeItem('newspaper-current-id');
            editor.value = '';
            localStorage.setItem('newspaper-draft', '');
            render();
            closeArticlesModal();
        }

        function openClearModal() {
            openConfirmModal('Wirklich den aktuellen Editor leeren? (Gespeicherte Artikel bleiben erhalten)', () => {
                editor.value = '';
                localStorage.setItem('newspaper-draft', '');
                currentArticleId = null;
                localStorage.removeItem('newspaper-current-id');
                render();
            });

        function exportPDF() {
            const element = document.getElementById('newspaper-output');
            html2pdf().from(element).save('MeineZeitung.pdf');
        }

        function exportImage() {
            const element = document.getElementById('newspaper-output');
            // Ensure proper rendering scale
            html2canvas(element, {scale: 2, backgroundColor: '#fdfbf7'}).then(canvas => {
                const link = document.createElement('a');
                link.download = 'MeineZeitung.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        function updateRawImagesView() {
            const entries = Object.entries(localImages);
            if (entries.length === 0) {
                rawImagesOutput.innerHTML = '<div class="text-sm text-slate-500">Keine Bilder gespeichert.</div>';
                return;
            }

            rawImagesOutput.innerHTML = entries.map(([id, dataUrl]) => {
                const previewUrl = dataUrl;
                const shortLabel = id.length > 24 ? `${id.slice(0, 24)}…` : id;
                const typeLabel = dataUrl.startsWith('data:image/png') ? 'PNG' : dataUrl.startsWith('data:image/jpeg') ? 'JPG' : 'Bild';
                return `
                    <div class="raw-image-item" title="${dataUrl}">
                        <img class="raw-image-preview" src="${previewUrl}" alt="${id}">
                        <div class="flex-1 min-w-0">
                            <div class="raw-image-name">${shortLabel}</div>
                            <div class="raw-image-meta">${typeLabel} • Base64</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function embedImagesInText() {
            let markdown = editor.value;
            const definitions = extractReferenceDefinitions(markdown);
            let changes = 0;

            markdown = markdown.replace(/(!\[[^\]]*\])\[([^\]]*)\]/g, (match, imgPart, refLabel) => {
                const refId = (refLabel || '').trim();
                const destination = definitions[normalizeReferenceLabel(refId)];
                if (destination && localImages[destination]) {
                    changes++;
                    return `${imgPart}(${localImages[destination]})`;
                }
                return match;
            });

            editor.value = markdown;
            localStorage.setItem('newspaper-draft', editor.value);
            render();
            alert(changes > 0 ? `${changes} Bildreferenz(en) wurden durch Base64-Daten ersetzt.` : 'Keine ersetzbaren Bildreferenzen gefunden.');
        }

        function extractImagesFromText() {
            let markdown = editor.value;
            let changes = 0;
            markdown = markdown.replace(/(!\[[^\]]*\])\((data:image\/[^;]+;base64,[^\)]+)\)/g, (match, imgPart, dataUrl) => {
                changes++;
                const imgId = 'img-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
                localImages[imgId] = dataUrl;
                return `${imgPart}[${imgId}]`;
            });
            editor.value = markdown;
            localStorage.setItem('newspaper-images', JSON.stringify(localImages));
            localStorage.setItem('newspaper-draft', editor.value);
            updateRawImagesView();
            render();
            alert(changes > 0 ? `${changes} Base64-Bild(er) wurde(n) extrahiert und als Referenz gespeichert.` : 'Keine eingebetteten Base64-Bilder im Text gefunden.');
        }

        function insertImageIntoEditor(dataUrl, mode) {
            const imgId = 'img-' + Date.now();
            localImages[imgId] = dataUrl;
            localStorage.setItem('newspaper-images', JSON.stringify(localImages));
            updateRawImagesView();

            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const before = editor.value.slice(0, start);
            const after = editor.value.slice(end);

            if (mode === 'reference') {
                const referenceSnippet = `![Bildbeschreibung | mittel][${imgId}]`;
                editor.value = before + referenceSnippet + after;
                editor.value += `\n\n[${imgId}]: ${imgId}\n`;
                const newCursor = start + referenceSnippet.length;
                editor.setSelectionRange(newCursor, newCursor);
            } else {
                const directSnippet = `![Bildbeschreibung | mittel](${dataUrl})`;
                editor.value = before + directSnippet + after;
                const newCursor = start + directSnippet.length;
                editor.setSelectionRange(newCursor, newCursor);
            }

            localStorage.setItem('newspaper-draft', editor.value);
            render();
        }

        imageTrigger.addEventListener('click', function(event) {
            event.stopPropagation();
            imageMenu.classList.toggle('open');
        });

        document.querySelectorAll('.image-menu-item').forEach(button => {
            button.addEventListener('click', function() {
                const action = this.getAttribute('data-action');
                const mode = this.getAttribute('data-mode');

                if (action === 'embed-images') {
                    imageMenu.classList.remove('open');
                    embedImagesInText();
                    return;
                }

                if (action === 'extract-images') {
                    imageMenu.classList.remove('open');
                    extractImagesFromText();
                    return;
                }

                pendingImageMode = mode || 'direct';
                imageMenu.classList.remove('open');
                fileInput.click();
            });
        });

        document.addEventListener('click', function() {
            imageMenu.classList.remove('open');
        });

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                insertImageIntoEditor(event.target.result, pendingImageMode);
                pendingImageMode = 'direct';
            };
            reader.readAsDataURL(file);
        });

        editor.addEventListener('input', () => {
            render();
            localStorage.setItem('newspaper-draft', editor.value); // Auto-save for refresh
        });

        function initPWA() {
            const manifest = { name: "Markdown Zeitung", short_name: "Zeitung", display: "standalone", start_url: ".", background_color: "#f8fafc", theme_color: "#1e293b", icons: [{ src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzFlMjkzYiIvPjx0ZXh0IHk9IjUyIiB4PSI1MCIgZm9udC1zaXplPSI1NCIgZm9udC1mYW1pbHk9InNlcmlmIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjZmZmIj5aPC90ZXh0Pjwvc3ZnPg==", sizes: "512x512", type: "image/svg+xml" }] };
            const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
            document.getElementById('manifest-link').setAttribute('href', URL.createObjectURL(manifestBlob));
        }
    </script>
